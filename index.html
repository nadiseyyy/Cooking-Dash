<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Retro Diner Dash 🍽️</title>

<style>
body {
  margin: 0;
  background: #111;
  color: #00ffcc;
  font-family: 'Courier New', monospace;
  text-align: center;
}

h1 { text-shadow: 0 0 10px #00ffcc; }

#ui {
  display: flex;
  justify-content: space-around;
  margin: 10px;
}

#game {
  position: relative;
  width: 90%;
  max-width: 700px;
  height: 400px;
  margin: auto;
  background: #222;
  border: 3px solid #00ffcc;
  overflow: hidden;
}

/* Chef */
#chef {
  position: absolute;
  width: 50px;
  bottom: 10px;
  left: 50%;
  transform: translateX(-50%);
}

/* Meja */
.table {
  position: absolute;
  width: 80px;
  height: 80px;
  background: brown;
  top: 60px;
}

#t1 { left: 10%; }
#t2 { left: 40%; }
#t3 { left: 70%; }

/* Customer */
.customer {
  position: absolute;
  width: 40px;
}

/* Mobile Control */
#controls {
  margin-top: 10px;
}

.ctrl-btn {
  padding: 10px;
  margin: 5px;
  font-size: 18px;
  border: 2px solid #00ffcc;
  background: black;
  color: #00ffcc;
}
</style>
</head>

<body>

<h1>🍽️ Retro Diner Dash</h1>

<div id="ui">
  <div>💰 Uang: <span id="money">0</span></div>
  <div>❤️ Nyawa: <span id="life">3</span></div>
  <div>⭐ Level: <span id="level">1</span></div>
</div>

<div id="game">
  <img id="chef" src="https://i.imgur.com/3ZQ3Z6v.png">

  <div class="table" id="t1"></div>
  <div class="table" id="t2"></div>
  <div class="table" id="t3"></div>
</div>

<div id="controls">
  <button class="ctrl-btn" onclick="move(-30)">⬅️</button>
  <button class="ctrl-btn" onclick="serve()">🍽️</button>
  <button class="ctrl-btn" onclick="move(30)">➡️</button>
</div>

<!-- Sound -->
<audio id="serveSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="failSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<script>
let chefX = window.innerWidth/2;
let money = 0;
let life = 3;
let level = 1;
let customers = [];

const chef = document.getElementById("chef");
const game = document.getElementById("game");

function updateUI(){
  moneyEl.innerText = money;
  lifeEl.innerText = life;
  levelEl.innerText = level;
}

function spawnCustomer(){
  let meja = Math.floor(Math.random()*3)+1;
  let cust = document.createElement("img");

  cust.src = "https://i.imgur.com/8Qf6G6B.png";
  cust.className = "customer";

  let table = document.getElementById("t"+meja);

  cust.style.left = table.offsetLeft + 20 + "px";
  cust.style.top = "10px";

  game.appendChild(cust);

  customers.push({el:cust, meja:meja, time:5});
}

setInterval(spawnCustomer, 3000);

setInterval(()=>{
  customers.forEach((c,i)=>{
    c.time--;
    if(c.time<=0){
      c.el.remove();
      customers.splice(i,1);
      life--;
      document.getElementById("failSound").play();

      if(life<=0){
        gameOver();
      }
    }
  });
  updateUI();
},1000);

function move(dx){
  chefX += dx;
  chef.style.left = chefX + "px";
}

function serve(){
  customers.forEach((c,i)=>{
    let table = document.getElementById("t"+c.meja);

    if(Math.abs(table.offsetLeft - chefX) < 60){
      c.el.remove();
      customers.splice(i,1);
      money += 10;
      document.getElementById("serveSound").play();

      if(money % 50 === 0){
        level++;
      }
    }
  });
  updateUI();
}

/* Keyboard */
document.addEventListener("keydown", e=>{
  if(e.key==="ArrowLeft") move(-30);
  if(e.key==="ArrowRight") move(30);
  if(e.key===" ") serve();
});

/* Leaderboard */
function gameOver(){
  let name = prompt("Game Over! Masukkan nama:");
  let data = JSON.parse(localStorage.getItem("leaderboard")) || [];
  data.push({name:name, score:money});
  localStorage.setItem("leaderboard", JSON.stringify(data));
  location.reload();
}

const moneyEl = document.getElementById("money");
const lifeEl = document.getElementById("life");
const levelEl = document.getElementById("level");

updateUI();
</script>

</body>
</html>
